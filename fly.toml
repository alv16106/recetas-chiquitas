app = 'recetas-chiquitas'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  S3_ENDPOINT = "https://fly.storage.tigris.dev"
  ENVIRONMENT = "production"
  RDS_DATABASE = "neondb"
  RDS_HOST = "p-crimson-resonance-ab6pv34u-pooler.eu-west-2.aws.neon.tech"
  RDS_IAM = 0
  RDS_USER = "neondb_owner"
  S3_BUCKET = "shy-mountain-3057"
  
